openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Buyurtma Boshqaruv Tizimi API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: stores
    description: Store management
  - name: accounts
    description: Account management
  - name: serviceTypes
    description: Service type management
  - name: orders
    description: Order management
  - name: clients
    description: Client management
  - name: telegram
    description: Telegram integration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/store-login:
    post:
      operationId: storeLogin
      tags: [auth]
      summary: Login with store username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreLoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/pin-login:
    post:
      operationId: pinLogin
      tags: [auth]
      summary: Login with PIN code (for workers)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinLoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinLoginResponse"
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores:
    get:
      operationId: getStores
      tags: [stores]
      summary: Get all stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
      responses:
        "201":
          description: Created store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    put:
      operationId: updateStore
      tags: [stores]
      summary: Update a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      summary: Delete a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /accounts:
    get:
      operationId: getAccounts
      tags: [accounts]
      summary: Get all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /service-types:
    get:
      operationId: getServiceTypes
      tags: [serviceTypes]
      summary: Get all service types
      responses:
        "200":
          description: List of service types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceType"
    post:
      operationId: createServiceType
      tags: [serviceTypes]
      summary: Create a service type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceTypeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceType"

  /service-types/{id}:
    put:
      operationId: updateServiceType
      tags: [serviceTypes]
      summary: Update a service type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceTypeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceType"
    delete:
      operationId: deleteServiceType
      tags: [serviceTypes]
      summary: Delete a service type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, accepted, ready]
        - name: storeId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/summary:
    get:
      operationId: getOrdersSummary
      tags: [orders]
      summary: Get orders summary counts
      responses:
        "200":
          description: Orders summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersSummary"

  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: Get all clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Manually create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clients/{id}/approve:
    post:
      operationId: approveClient
      tags: [clients]
      summary: Approve a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}/reject:
    post:
      operationId: rejectClient
      tags: [clients]
      summary: Reject a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    StoreLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    StoreLoginResponse:
      type: object
      properties:
        token:
          type: string
        store:
          $ref: "#/components/schemas/Store"
        role:
          type: string
      required: [token, role]

    PinLoginRequest:
      type: object
      properties:
        pin:
          type: string
        storeId:
          type: integer
      required: [pin, storeId]

    PinLoginResponse:
      type: object
      properties:
        token:
          type: string
        account:
          $ref: "#/components/schemas/Account"
        role:
          type: string
      required: [token, account, role]

    MeResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        storeId:
          type: integer
          nullable: true
        storeName:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
      required: [id, username, role]

    Store:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, username, createdAt]

    CreateStoreRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string
      required: [name, username, password]

    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [superadmin, admin, viewer, worker]
        pin:
          type: string
          nullable: true
        storeId:
          type: integer
          nullable: true
        storeName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, role, createdAt]

    CreateAccountRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [superadmin, admin, viewer, worker]
        pin:
          type: string
          nullable: true
        storeId:
          type: integer
          nullable: true
      required: [name, role]

    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [superadmin, admin, viewer, worker]
        pin:
          type: string
          nullable: true
        storeId:
          type: integer
          nullable: true

    ServiceType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        storeId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, createdAt]

    CreateServiceTypeRequest:
      type: object
      properties:
        name:
          type: string
        storeId:
          type: integer
          nullable: true
      required: [name]

    Order:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: string
        status:
          type: string
          enum: [new, accepted, ready]
        serviceTypeName:
          type: string
        quantity:
          type: number
        unit:
          type: string
          nullable: true
        shelf:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        storeId:
          type: integer
        storeName:
          type: string
        clientId:
          type: integer
          nullable: true
        clientName:
          type: string
          nullable: true
        clientPhone:
          type: string
          nullable: true
        createdByName:
          type: string
        acceptedByName:
          type: string
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        readyAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        lockPin:
          type: string
          nullable: true
        isLocked:
          type: boolean
        createdById:
          type: integer
          nullable: true
        acceptedById:
          type: integer
          nullable: true
        serviceTypeId:
          type: integer
          nullable: true
      required: [id, orderId, status, serviceTypeName, quantity, storeId, storeName, createdByName, createdAt]

    CreateOrderRequest:
      type: object
      properties:
        serviceTypeId:
          type: integer
        quantity:
          type: number
        unit:
          type: string
          nullable: true
        shelf:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        clientId:
          type: integer
          nullable: true
        clientName:
          type: string
          nullable: true
        clientPhone:
          type: string
          nullable: true
      required: [serviceTypeId, quantity]

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [new, accepted, ready]
        lockPin:
          type: string
          nullable: true
          description: Lock PIN required when accepting a locked order
      required: [status]

    OrdersSummary:
      type: object
      properties:
        new:
          type: integer
        accepted:
          type: integer
        ready:
          type: integer
        totalToday:
          type: integer
      required: [new, accepted, ready, totalToday]

    Client:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        telegramUserId:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required: [id, firstName, lastName, phone, status, createdAt]

    CreateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        telegramUserId:
          type: string
          nullable: true
      required: [firstName, lastName, phone]
